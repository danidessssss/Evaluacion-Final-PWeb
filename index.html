<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade High Scores - Vaus System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>SISTEMA DE PUNTUACIONES</h1>
        <h2>Registro Oficial</h2>
    </header>

    <main class="contenedor-principal">
        <section class="panel-registro">
            <h3>NUEVO REGISTRO</h3>

            <form id="formularioArcade">

                <div class="grupo-input">
                    <label for="jugador">Iniciales del Jugador (Ej. MAX):</label>
                    <input type="text" id="jugador" name="jugador" placeholder="Ingresa 3 letras">
                    <span class="msg-error" id="errorJugador"></span>
                </div>

                <div class="grupo-input">
                    <label for="puntos">Puntuación Obtenida:</label>
                    <input type="number" id="puntos" name="puntos" placeholder="Ej. 15000">
                    <span class="msg-error" id="errorPuntos"></span>
                </div>

                <div class="grupo-input">
                    <label for="confirmarPuntos">Confirmar Puntuación:</label>
                    <input type="number" id="confirmarPuntos" name="confirmarPuntos" placeholder="Repite la puntuación">
                    <span class="msg-error" id="errorConfirmar"></span>
                </div>

                <div class="grupo-input">
                    <label for="nivel">Nivel Máximo Alcanzado:</label>
                    <select id="nivel" name="nivel">
                        <option value="">-- Selecciona un Nivel --</option>
                        <option value="1">Nivel 1: Inicio</option>
                        <option value="2">Nivel 2: DOH</option>
                        <option value="3">Nivel 3: Nave Nodriza</option>
                    </select>
                    <span class="msg-error" id="errorNivel"></span>
                </div>

                <button type="submit" id="btnGuardar">GUARDAR HIGH-SCORE</button>
            </form>
        </section>

        <section class="panel-resultados">
            <h3>TOP SCORES REGISTRADOS</h3>
            <ul id="listaPuntuaciones" class="lista-arcade">
            </ul>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>

</html>
